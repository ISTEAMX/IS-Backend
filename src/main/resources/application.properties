spring.application.name=university
spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:app_db}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# WARNING: Use 'validate' or 'none' with Flyway/Liquibase in production
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}

# JWT secret must be a Base64-encoded key of at least 256 bits (32 bytes)
# IMPORTANT: Override JWT_SECRET_KEY in production with a secure random key
jwt.secret=${JWT_SECRET_KEY:Y2hhbmdlLXRoaXMtaW4tcHJvZHVjdGlvbi1yZXBsYWNlLXdpdGgtc2VjdXJlLWtleQ==}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS - comma-separated list of allowed origins
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

