spring.application.name=university
spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:app_db}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=true
spring.flyway.encoding=UTF-8
spring.flyway.clean-disabled=${FLYWAY_CLEAN_DISABLED:true}

jwt.secret=${JWT_SECRET_KEY}
jwt.expiration=${JWT_EXPIRATION:86400000}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.health.defaults.enabled=true
management.health.db.enabled=true
management.health.diskSpace.enabled=true

management.cloudwatch.metrics.export.enabled=${CLOUDWATCH_ENABLED:false}
management.cloudwatch.metrics.export.namespace=isteamx-backend
management.cloudwatch.metrics.export.step=1m

monitoring.cloudwatch.enabled=${CLOUDWATCH_ENABLED:false}
monitoring.cloudwatch.region=${AWS_REGION:eu-central-1}
monitoring.cloudwatch.log-group=${CLOUDWATCH_LOG_GROUP:/isteamx/backend}
monitoring.cloudwatch.log-stream=${CLOUDWATCH_LOG_STREAM:app}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:3000,http://isteamx-unisync.s3-website.eu-central-1.amazonaws.com}

spring.data.web.pageable.default-page-size=50
spring.data.web.pageable.max-page-size=200

