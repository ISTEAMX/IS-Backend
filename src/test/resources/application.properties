spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# Test-only JWT secret — NOT used in production. Generate via: openssl rand -base64 32
jwt.secret=dGVzdC1vbmx5LXNlY3JldC1rZXktZG8tbm90LXVzZS1pbi1wcm9kdWN0aW9u
jwt.expiration=86400000

monitoring.cloudwatch.enabled=false
cors.allowed-origins=http://localhost

spring.data.web.pageable.default-page-size=50
spring.data.web.pageable.max-page-size=200

