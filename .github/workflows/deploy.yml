name: Manual Deploy Backend

on:
  workflow_dispatch:

jobs:
  call-reusable-deploy-workflow:
    name: Call Reusable Deploy Workflow

    uses: ISTEAMX/IS-DevOps/.github/workflows/continuous-deployment-backend.yml@main

    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      ECR_REPOSITORY_URL: ${{ secrets.ECR_REPOSITORY_URL }}